<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Military Calisthenics — 4-Week Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --surface2: #f2f1ee;
    --border: #e2e0da;
    --border2: #cccac3;
    --text: #1a1917;
    --text2: #5c5a55;
    --text3: #9b9891;
    --blue-bg: #e8f0fc;
    --blue-text: #1a4fa0;
    --blue-border: #93b4ef;
    --green-bg: #e4f5ec;
    --green-text: #1a6e40;
    --amber-bg: #fef3e2;
    --amber-text: #7a4a0a;
    --purple-bg: #eeebfc;
    --purple-text: #4a3a9e;
    --gray-bg: #efefec;
    --gray-text: #3d3c38;
    --coral-bg: #fdeee9;
    --coral-text: #7a2e12;
    --accent: #2a5fd6;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .logo {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  header .logo svg { width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  header h1 { font-size: 17px; font-weight: 600; color: var(--text); }
  header p { font-size: 13px; color: var(--text2); margin-top: 1px; }

  .main { max-width: 780px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  .week-tabs {
    display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap;
  }
  .week-btn {
    padding: 7px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .week-btn:hover { border-color: var(--accent); color: var(--accent); }
  .week-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .week-header { margin-bottom: 1.25rem; }
  .week-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin-bottom: 4px; }
  .week-desc { font-size: 14px; color: var(--text2); line-height: 1.6; }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 1.25rem;
  }
  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    user-select: none;
  }
  .day-card:hover { border-color: var(--border2); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .day-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(42,95,214,0.12); }
  .day-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .day-focus { font-size: 12px; color: var(--text2); margin-bottom: 10px; }

  .badge {
    display: inline-block; font-size: 11px; font-weight: 500;
    padding: 2px 8px; border-radius: 20px;
  }
  .b-push { background: var(--blue-bg); color: var(--blue-text); }
  .b-pull { background: var(--green-bg); color: var(--green-text); }
  .b-legs { background: var(--amber-bg); color: var(--amber-text); }
  .b-core { background: var(--purple-bg); color: var(--purple-text); }
  .b-rest { background: var(--gray-bg); color: var(--gray-text); }
  .b-full { background: var(--coral-bg); color: var(--coral-text); }

  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.25rem 1rem;
    display: none;
  }
  .detail-panel.visible { display: block; }
  .detail-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 1rem; }
  .detail-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .detail-sub { font-size: 13px; color: var(--text3); margin-top: 2px; }

  .ex-list { list-style: none; border-top: 1px solid var(--border); }
  .ex-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .ex-num {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--surface2); color: var(--text3);
    font-size: 11px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .ex-name { font-weight: 500; color: var(--text); flex: 1; line-height: 1.4; }
  .ex-sets { color: var(--text2); font-size: 13px; white-space: nowrap; }
  .ex-link {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; font-weight: 500;
    color: var(--blue-text);
    text-decoration: none;
    padding: 4px 9px;
    border: 1px solid var(--blue-border);
    border-radius: var(--radius-sm);
    background: var(--blue-bg);
    white-space: nowrap; flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .ex-link:hover { opacity: 0.75; }
  .ex-link svg { width: 12px; height: 12px; fill: var(--blue-text); }

  .tip-box {
    margin-top: 1rem;
    padding: 10px 14px;
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 13px; color: var(--text2); line-height: 1.6;
  }
  .tip-label { font-weight: 600; color: var(--text); }

  .progress-bar-wrap { margin-bottom: 1.5rem; }
  .progress-label { font-size: 12px; color: var(--text3); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .progress-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; }

  @media (max-width: 480px) {
    header { padding: 1rem; }
    .main { padding: 1rem 0.75rem 3rem; }
    .days-grid { grid-template-columns: repeat(2, 1fr); }
    .ex-item { flex-wrap: wrap; gap: 6px; }
    .ex-sets { order: 3; }
    .ex-link { order: 4; }
  }
</style>
</head>

      { name: "Wednesday", focus: "Active Rest", type: "rest", exercises: [{ name: "30-min walk or jog", sets: "1 round" },{ name: "Full-body stretch", sets: "20 min" }], tip: "Extra stretch time today — your body needs it before the final push of the week." },
      { name: "Thursday", focus: "Pull & Back", type: "pull", exercises: [{ name: "Rows max reps", sets: "1 × max" },{ name: "Superman holds", sets: "4 × 15" },{ name: "Prone Y-T-W raises", sets: "3 × 15 each" },{ name: "Negative pull-ups", sets: "3 × 6 slow" }], tip: "Hit a row max rep test just like Monday's push-up test." },
      { name: "Friday", focus: "AMRAP Retest", type: "full", exercises: [{ name: "20-min AMRAP: 10 push-ups, 10 squats, 10 sit-ups, 10 mountain climbers", sets: "Beat your Week 3 score" }], tip: "Retest the exact same AMRAP from Week 3. Most people improve by 2–4 rounds in just one week." },
      { name: "Saturday", focus: "Core", type: "core", exercises: [{ name: "Sit-up max test (2 min)", sets: "1 × timed" },{ name: "Plank hold max", sets: "1 × max" },{ name: "V-ups", sets: "3 × 15" },{ name: "Dead bug", sets: "3 × 12/side" },{ name: "Side plank", sets: "3 × 45 sec/side" }], tip: "The 2-min sit-up test is the official US Army ACFT benchmark. Log your score." },
      { name: "Sunday", focus: "Full Rest", type: "rest", exercises: [{ name: "Full rest — you earned it", sets: "—" }], tip: "Month complete. Compare your max tests from Week 4 to your starting performance." },
    ]
  }
];

const badgeClass = { push:'b-push', pull:'b-pull', legs:'b-legs', core:'b-core', rest:'b-rest', full:'b-full' };
const badgeLabel = { push:'Push', pull:'Pull', legs:'Legs/Core', core:'Core', rest:'Rest', full:'Full Body' };

let currentWeek = 0;

function getLink(name) {
  if (YT[name] !== undefined) return YT[name];
  const key = Object.keys(YT).find(k => k && name.toLowerCase().startsWith(k.toLowerCase().split(' ').slice(0,2).join(' ')));
  return key ? YT[key] : null;
}

function renderWeek(idx) {
  currentWeek = idx;
  const week = weeks[idx];
  document.getElementById('weekLabel').textContent = week.label;
  document.getElementById('weekDesc').textContent = week.desc;
  document.querySelectorAll('.week-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  const pct = Math.round(((idx+1)/4)*100);
  document.getElementById('progressLabel').textContent = `Week ${idx+1} of 4`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';
  week.days.forEach((day, di) => {
    const card = document.createElement('div');
    card.className = 'day-card';
    card.innerHTML = `<div class="day-name">${day.name}</div><div class="day-focus">${day.focus}</div><span class="badge ${badgeClass[day.type]||'b-rest'}">${badgeLabel[day.type]||day.type}</span>`;
    card.onclick = () => selectDay(di);
    grid.appendChild(card);
  });
  const panel = document.getElementById('detailPanel');
  panel.classList.remove('visible');
}

function selectDay(di) {
  const day = weeks[currentWeek].days[di];
  document.querySelectorAll('.day-card').forEach((c,i) => c.classList.toggle('selected', i===di));

  const exHTML = day.exercises.map((e, i) => {
    const url = getLink(e.name);
    const linkHTML = url
      ? `<a class="ex-link" href="${url}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg> how-to</a>`
      : '';
    return `<li class="ex-item"><span class="ex-num">${i+1}</span><span class="ex-name">${e.name}</span><span class="ex-sets">${e.sets}</span>${linkHTML}</li>`;
  }).join('');

  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `
    <div class="detail-head">
      <div><div class="detail-title">${day.name} — ${day.focus}</div><div class="detail-sub">${weeks[currentWeek].label}</div></div>
      <span class="badge ${badgeClass[day.type]||'b-rest'}">${badgeLabel[day.type]||day.type}</span>
    </div>
    <ul class="ex-list">${exHTML}</ul>
    <div class="tip-box"><span class="tip-label">Tip: </span>${day.tip}</div>
  `;
  panel.classList.add('visible');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

const tabs = document.getElementById('weekTabs');
weeks.forEach((w,i) => {
  const btn = document.createElement('button');
  btn.className = 'week-btn' + (i===0?' active':'');
  btn.textContent = `Week ${i+1}`;
  btn.onclick = () => renderWeek(i);
  tabs.appendChild(btn);
});
renderWeek(0);
</script>
</body>
</html>
