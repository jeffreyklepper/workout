<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Military Calisthenics — 4-Week Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f4; --surface: #ffffff; --surface2: #f2f1ee;
    --border: #e2e0da; --border2: #cccac3;
    --text: #1a1917; --text2: #5c5a55; --text3: #9b9891;
    --blue-bg: #e8f0fc; --blue-text: #1a4fa0; --blue-border: #93b4ef;
    --green-bg: #e4f5ec; --green-text: #1a6e40;
    --amber-bg: #fef3e2; --amber-text: #7a4a0a;
    --purple-bg: #eeebfc; --purple-text: #4a3a9e;
    --gray-bg: #efefec; --gray-text: #3d3c38;
    --coral-bg: #fdeee9; --coral-text: #7a2e12;
    --accent: #2a5fd6; --accent-light: #e8f0fc;
    --green-check: #1a6e40; --green-check-bg: #e4f5ec;
    --radius: 10px; --radius-sm: 6px;
  }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; scrollbar-gutter: stable; }

  /* PROFILE SCREEN */
  #profileScreen {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem 1rem;
  }
  .profile-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 2rem; width: 100%; max-width: 380px;
  }
  .profile-box h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .profile-box p { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; }
  .profile-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.25rem; }
  .profile-btn {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--surface2);
    cursor: pointer; font-family: inherit; font-size: 14px;
    font-weight: 500; color: var(--text); transition: all 0.15s; text-align: left;
  }
  .profile-btn:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
  .profile-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; flex-shrink: 0;
  }
  .profile-meta { font-size: 12px; color: var(--text3); font-weight: 400; margin-top: 1px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
  .add-profile { display: flex; gap: 8px; }
  .add-profile input {
    flex: 1; padding: 9px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); font-family: inherit; font-size: 14px;
    background: var(--surface); color: var(--text); outline: none;
  }
  .add-profile input:focus { border-color: var(--accent); }
  .btn-primary {
    padding: 9px 16px; border-radius: var(--radius-sm);
    background: var(--accent); color: #fff; border: none;
    font-family: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer; white-space: nowrap;
  }
  .btn-primary:hover { opacity: 0.88; }

  /* MAIN APP */
  #appScreen { display: none; }
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 1rem 1.25rem; display: flex; align-items: center; gap: 12px;
  }
  .header-logo {
    width: 34px; height: 34px; background: var(--accent); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .header-logo svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .header-info { flex: 1; }
  .header-info h1 { font-size: 15px; font-weight: 600; }
  .header-info p { font-size: 12px; color: var(--text2); }
  .user-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--surface2);
    cursor: pointer; font-family: inherit; font-size: 13px;
    font-weight: 500; color: var(--text2);
  }
  .user-pill:hover { border-color: var(--border2); }
  .user-dot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; }

  .main { max-width: 780px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  /* OVERALL PROGRESS */
  .overall-progress {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.1rem 1.25rem; margin-bottom: 1.25rem;
  }
  .op-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .op-label { font-size: 13px; font-weight: 500; color: var(--text); }
  .op-pct { font-size: 22px; font-weight: 600; color: var(--accent); }
  .op-track { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
  .op-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.5s ease; }
  .op-stats { display: flex; gap: 16px; }
  .op-stat { font-size: 12px; color: var(--text3); }
  .op-stat span { color: var(--text2); font-weight: 500; }

  .week-tabs { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .week-btn {
    padding: 7px 16px; border-radius: var(--radius-sm);
    border: 1px solid var(--border2); background: var(--surface);
    color: var(--text2); font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: inherit; transition: all 0.15s; position: relative;
  }
  .week-btn:hover { border-color: var(--accent); color: var(--accent); }
  .week-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .week-done-dot {
    position: absolute; top: -4px; right: -4px;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--green-text); border: 2px solid var(--bg);
    display: none;
  }
  .week-btn.has-progress .week-done-dot { display: block; }

  .week-header { margin-bottom: 1.25rem; }
  .week-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin-bottom: 4px; }
  .week-desc { font-size: 14px; color: var(--text2); line-height: 1.6; }

  .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 1.25rem; }
  .day-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1rem; cursor: pointer;
    transition: border-color 0.15s; position: relative;
  }
  .day-card:hover { border-color: var(--border2); }
  .day-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(42,95,214,0.12); }
  .day-card.completed { border-color: #6cc08a; background: #f5fbf7; }
  .day-check {
    position: absolute; top: 10px; right: 10px;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--green-check-bg); display: none;
    align-items: center; justify-content: center;
  }
  .day-check svg { width: 11px; height: 11px; stroke: var(--green-check); stroke-width: 2.5; fill: none; }
  .day-card.completed .day-check { display: flex; }
  .day-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; padding-right: 24px; }
  .day-focus { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
  .day-prog { font-size: 11px; color: var(--text3); margin-top: 6px; }
  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  .b-push { background: var(--blue-bg); color: var(--blue-text); }
  .b-pull { background: var(--green-bg); color: var(--green-text); }
  .b-legs { background: var(--amber-bg); color: var(--amber-text); }
  .b-core { background: var(--purple-bg); color: var(--purple-text); }
  .b-rest { background: var(--gray-bg); color: var(--gray-text); }
  .b-full { background: var(--coral-bg); color: var(--coral-text); }

  .detail-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.25rem; display: none;
  }
  .detail-panel.visible { display: block; }
  .detail-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 1rem; }
  .detail-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .detail-sub { font-size: 13px; color: var(--text3); margin-top: 2px; }
  .mark-day-btn {
    padding: 7px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--border2); background: var(--surface2);
    font-family: inherit; font-size: 13px; font-weight: 500;
    color: var(--text2); cursor: pointer; white-space: nowrap; flex-shrink: 0;
    transition: all 0.15s;
  }
  .mark-day-btn.done { background: var(--green-check-bg); color: var(--green-check); border-color: #6cc08a; }

  .ex-list { list-style: none; border-top: 1px solid var(--border); }
  .ex-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px;
  }
  .ex-check-btn {
    width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
    border: 1.5px solid var(--border2); background: var(--surface);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .ex-check-btn svg { width: 11px; height: 11px; stroke: #fff; stroke-width: 2.5; fill: none; display: none; }
  .ex-check-btn.checked { background: var(--green-check); border-color: var(--green-check); }
  .ex-check-btn.checked svg { display: block; }
  .ex-name { font-weight: 500; color: var(--text); flex: 1; line-height: 1.4; }
  .ex-name.done-ex { text-decoration: line-through; color: var(--text3); }
  .ex-sets { color: var(--text2); font-size: 13px; white-space: nowrap; }
  .ex-link {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; font-weight: 500; color: var(--blue-text);
    text-decoration: none; padding: 4px 9px;
    border: 1px solid var(--blue-border); border-radius: var(--radius-sm);
    background: var(--blue-bg); white-space: nowrap; flex-shrink: 0; transition: opacity 0.15s;
  }
  .ex-link:hover { opacity: 0.75; }
  .ex-link svg { width: 12px; height: 12px; fill: var(--blue-text); }

  .tip-box {
    margin-top: 1rem; padding: 10px 14px;
    background: var(--surface2); border-left: 3px solid var(--accent);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 13px; color: var(--text2); line-height: 1.6;
  }
  .tip-label { font-weight: 600; color: var(--text); }

  .reset-link { font-size: 12px; color: var(--text3); text-decoration: underline; cursor: pointer; margin-top: 8px; display: inline-block; }
  .reset-link:hover { color: #c0392b; }

  @media (max-width: 480px) {
    header { padding: 0.875rem 1rem; }
    .main { padding: 1rem 0.75rem 3rem; }
    .days-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .ex-item { flex-wrap: wrap; gap: 6px; }
    .ex-sets { order: 3; }
    .ex-link { order: 4; }
  }
</style>
</head>
<body>

<!-- PROFILE SELECTION SCREEN -->
<div id="profileScreen">
  <div class="profile-box">
    <h2>Who's training today?</h2>
    <p>Select your profile to load your progress.</p>
    <div class="profile-list" id="profileList"></div>
    <hr class="divider">
    <div class="add-profile">
      <input type="text" id="newProfileName" placeholder="Add a new name..." maxlength="20">
      <button class="btn-primary" onclick="addProfile()">Add</button>
    </div>
  </div>
</div>

<!-- MAIN APP SCREEN -->
<div id="appScreen">
  <header>
    <div class="header-logo">
      <svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M6 12h12M3 8h3M18 8h3M3 16h3M18 16h3"/></svg>
    </div>
    <div class="header-info">
      <h1>Military Calisthenics</h1>
      <p>4-Week Progressive Plan</p>
    </div>
    <button class="user-pill" onclick="switchProfile()" id="userPill">
      <div class="user-dot" id="userDot"></div>
      <span id="userPillName"></span>
    </button>
  </header>

  <div class="main">
    <div class="overall-progress">
      <div class="op-top">
        <div class="op-label">Overall progress</div>
        <div class="op-pct" id="overallPct">0%</div>
      </div>
      <div class="op-track"><div class="op-fill" id="overallFill" style="width:0%"></div></div>
      <div class="op-stats">
        <div class="op-stat">Days completed: <span id="statDays">0</span> / 28</div>
        <div class="op-stat">Exercises checked: <span id="statEx">0</span></div>
      </div>
      <div id="resetAllWrap" style="margin-top:10px;display:none;">
        <span class="reset-link" style="color:var(--text3);" onclick="confirmResetAll()">Reset all progress and start over</span>
      </div>
      <div id="resetConfirm" style="display:none;margin-top:10px;padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border2);">
        <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:8px;">Reset all 28 days for <span id="resetProfileName"></span>? This cannot be undone.</div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button class="btn-primary" style="background:#c0392b;border:none;padding:7px 14px;font-size:13px;" onclick="doResetAll()">Yes, reset everything</button>
          <button class="mark-day-btn" onclick="cancelResetAll()">Cancel</button>
        </div>
      </div>
    </div>

    <div class="week-tabs" id="weekTabs"></div>
    <div class="week-header">
      <div class="week-label" id="weekLabel"></div>
      <div class="week-desc" id="weekDesc"></div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
    <div class="detail-panel" id="detailPanel"></div>
  </div>
</div>

<script>
const AVATAR_COLORS = [
  { bg: '#e8f0fc', text: '#1a4fa0' },
  { bg: '#e4f5ec', text: '#1a6e40' },
  { bg: '#fdeee9', text: '#7a2e12' },
  { bg: '#eeebfc', text: '#4a3a9e' },
  { bg: '#fef3e2', text: '#7a4a0a' },
  { bg: '#fbeaf1', text: '#7a1a45' },

const YT = {
  // PUSH exercises — NASM & verified no-equipment tutorials

const weeks = [
  { label: "Week 1 — Foundation", desc: "Learn the movement patterns and find your baseline. Focus on form over reps. Rest 90 seconds between sets.", days: [
    { name: "Monday", focus: "Push", type: "push", exercises: [{ name: "Push-ups", sets: "3 × 10" },{ name: "Pike push-ups (shoulders)", sets: "3 × 8" },{ name: "Diamond push-ups", sets: "2 × 8" },{ name: "Tricep dips (on chair)", sets: "3 × 10" }], tip: "Keep your core tight and elbows at 45° during push-ups — don't let them flare wide." },
    { name: "Tuesday", focus: "Legs & Core", type: "legs", exercises: [{ name: "Bodyweight squats", sets: "3 × 15" },{ name: "Alternating lunges", sets: "3 × 10 each" },{ name: "Glute bridges", sets: "3 × 15" },{ name: "Plank hold", sets: "3 × 20 sec" },{ name: "Hollow body hold", sets: "3 × 15 sec" }], tip: "The hollow body hold is the foundation of military core training — chin tucked, lower back pressed to floor." },
    { name: "Wednesday", focus: "Active Rest", type: "rest", exercises: [{ name: "20-min brisk walk", sets: "1 round" },{ name: "Hip flexor stretch", sets: "2 × 30 sec/side" },{ name: "Chest doorframe stretch", sets: "2 × 30 sec" },{ name: "Child's pose", sets: "2 × 30 sec" }], tip: "Active rest days improve recovery and blood flow without taxing your muscles further." },

const badgeClass = { push:'b-push', pull:'b-pull', legs:'b-legs', core:'b-core', rest:'b-rest', full:'b-full' };
const badgeLabel = { push:'Push', pull:'Pull', legs:'Legs/Core', core:'Core', rest:'Rest', full:'Full Body' };

let currentProfile = null;
let currentWeek = 0;
let currentDay = null;

const TOTAL_DAYS = 28;

function storageKey(profile) { return 'mc_progress_' + profile.toLowerCase().replace(/\s+/g,'_'); }
function profilesKey() { return 'mc_profiles'; }

function getProfiles() {
  try { return JSON.parse(localStorage.getItem(profilesKey()) || '[]'); } catch(e) { return []; }
}
function saveProfiles(p) { localStorage.setItem(profilesKey(), JSON.stringify(p)); }

function getProgress(profile) {
  try { return JSON.parse(localStorage.getItem(storageKey(profile)) || '{}'); } catch(e) { return {}; }
}
function saveProgress(profile, data) { localStorage.setItem(storageKey(profile), JSON.stringify(data)); }

function dayKey(wi, di) { return wi + '_' + di; }
function exKey(wi, di, ei) { return wi + '_' + di + '_' + ei; }

function getLink(name) {
  if (YT[name] !== undefined) return YT[name];
  return null;
}

function avatarColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
}

function renderProfileScreen() {
  document.getElementById('profileScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
  const profiles = getProfiles();
  const list = document.getElementById('profileList');
  list.innerHTML = '';
  if (profiles.length === 0) {
    list.innerHTML = '<div style="font-size:13px;color:var(--text3);text-align:center;padding:8px 0;">No profiles yet — add one below.</div>';
    return;
  }
  profiles.forEach(name => {
    const prog = getProgress(name);
    const daysCount = Object.keys(prog).filter(k => k.includes('_') && k.split('_').length === 2 && prog[k] === true).length;
    const col = avatarColor(name);
    const btn = document.createElement('button');
    btn.className = 'profile-btn';
    btn.innerHTML = `<div class="profile-avatar" style="background:${col.bg};color:${col.text}">${initials(name)}</div><div><div>${name}</div><div class="profile-meta">${daysCount} of 28 days completed</div></div>`;
    btn.onclick = () => loadProfile(name);
    list.appendChild(btn);
  });
}

function addProfile() {
  const input = document.getElementById('newProfileName');
  const name = input.value.trim();
  if (!name) return;
  const profiles = getProfiles();
  if (profiles.includes(name)) { input.value = ''; return; }
  profiles.push(name);
  saveProfiles(profiles);
  input.value = '';
  renderProfileScreen();
}

document.getElementById('newProfileName').addEventListener('keydown', e => { if (e.key === 'Enter') addProfile(); });

function loadProfile(name) {
  currentProfile = name;
  document.getElementById('profileScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  const col = avatarColor(name);
  document.getElementById('userDot').style.background = col.bg;
  document.getElementById('userDot').style.color = col.text;
  document.getElementById('userDot').textContent = initials(name);
  document.getElementById('userPillName').textContent = name;
  buildWeekTabs();
  renderWeek(0);
  updateOverall();
}

function switchProfile() {
  currentProfile = null;
  currentDay = null;
  renderProfileScreen();
}

function buildWeekTabs() {
  const tabs = document.getElementById('weekTabs');
  tabs.innerHTML = '';
  weeks.forEach((w, i) => {
    const btn = document.createElement('button');
    btn.className = 'week-btn';
    btn.innerHTML = `Week ${i+1}<span class="week-done-dot"></span>`;
    btn.onclick = () => renderWeek(i);
    tabs.appendChild(btn);
  });
}

function updateWeekTabDots() {
  const prog = getProgress(currentProfile);
  document.querySelectorAll('.week-btn').forEach((btn, i) => {
    const anyDone = weeks[i].days.some((_, di) => prog[dayKey(i, di)] === true);
    btn.classList.toggle('has-progress', anyDone);
  });
}

function renderWeek(idx) {
  currentWeek = idx;
  currentDay = null;
  const week = weeks[idx];
  document.getElementById('weekLabel').textContent = week.label;
  document.getElementById('weekDesc').textContent = week.desc;
  document.querySelectorAll('.week-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  updateWeekTabDots();

  const prog = getProgress(currentProfile);
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';
  week.days.forEach((day, di) => {
    const isDayDone = prog[dayKey(idx, di)] === true;
    const exDone = day.exercises.filter((_, ei) => prog[exKey(idx, di, ei)] === true).length;
    const card = document.createElement('div');
    card.className = 'day-card' + (isDayDone ? ' completed' : '');
    card.innerHTML = `
      <div class="day-check"><svg viewBox="0 0 12 12"><polyline points="1,6 4,10 11,2"/></svg></div>
      <div class="day-name">${day.name}</div>
      <div class="day-focus">${day.focus}</div>
      <span class="badge ${badgeClass[day.type]||'b-rest'}">${badgeLabel[day.type]||day.type}</span>
      ${exDone > 0 && !isDayDone ? `<div class="day-prog">${exDone}/${day.exercises.length} exercises done</div>` : ''}
    `;
    card.onclick = () => selectDay(di);
    grid.appendChild(card);
  });
  document.getElementById('detailPanel').classList.remove('visible');
}

function selectDay(di) {
  currentDay = di;
  const day = weeks[currentWeek].days[di];
  const prog = getProgress(currentProfile);
  const isDayDone = prog[dayKey(currentWeek, di)] === true;

  document.querySelectorAll('.day-card').forEach((c,i) => c.classList.toggle('selected', i===di));

  const exHTML = day.exercises.map((e, ei) => {
    const checked = prog[exKey(currentWeek, di, ei)] === true;
    const url = getLink(e.name);
    const linkHTML = url ? `<a class="ex-link" href="${url}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg> how-to</a>` : '';
    return `<li class="ex-item">
      <button class="ex-check-btn ${checked?'checked':''}" onclick="toggleEx(${di},${ei})" aria-label="Mark ${e.name} complete">
        <svg viewBox="0 0 12 12"><polyline points="1,6 4,10 11,2"/></svg>
      </button>
      <span class="ex-name ${checked?'done-ex':''}">${e.name}</span>
      <span class="ex-sets">${e.sets}</span>
      ${linkHTML}
    </li>`;
  }).join('');

  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `
    <div class="detail-head">
      <div>
        <div class="detail-title">${day.name} — ${day.focus}</div>
        <div class="detail-sub">${weeks[currentWeek].label}</div>
      </div>
      <button class="mark-day-btn ${isDayDone?'done':''}" id="markDayBtn" onclick="toggleDay(${di})">
        ${isDayDone ? '✓ Day complete' : 'Mark day done'}
      </button>
    </div>
    <ul class="ex-list">${exHTML}</ul>
    <div class="tip-box"><span class="tip-label">Tip: </span>${day.tip}</div>
    <span class="reset-link" onclick="resetDay(${di})">Reset this day</span>
  `;
  panel.classList.add('visible');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function toggleEx(di, ei) {
  const prog = getProgress(currentProfile);
  const k = exKey(currentWeek, di, ei);
  prog[k] = !prog[k];
  const day = weeks[currentWeek].days[di];
  const allChecked = day.exercises.every((_, i) => prog[exKey(currentWeek, di, i)] === true);
  prog[dayKey(currentWeek, di)] = allChecked;
  saveProgress(currentProfile, prog);
  updateOverall();
  updateWeekTabDots();
  rebuildDayCards();
  selectDay(di);
}

function toggleDay(di) {
  const prog = getProgress(currentProfile);
  const k = dayKey(currentWeek, di);
  prog[k] = !prog[k];
  weeks[currentWeek].days[di].exercises.forEach((_, ei) => {
    prog[exKey(currentWeek, di, ei)] = prog[k];
  });
  saveProgress(currentProfile, prog);
  updateOverall();
  updateWeekTabDots();
  rebuildDayCards();
  selectDay(di);
}

function rebuildDayCards() {
  const prog = getProgress(currentProfile);
  const week = weeks[currentWeek];
  const cards = document.querySelectorAll('.day-card');
  cards.forEach((card, di) => {
    const day = week.days[di];
    const isDayDone = prog[dayKey(currentWeek, di)] === true;
    const exDone = day.exercises.filter((_, ei) => prog[exKey(currentWeek, di, ei)] === true).length;
    card.className = 'day-card' + (card.classList.contains('selected') ? ' selected' : '') + (isDayDone ? ' completed' : '');
    const chk = card.querySelector('.day-check');
    if (chk) chk.style.display = isDayDone ? 'flex' : 'none';
    let progEl = card.querySelector('.day-prog');
    if (exDone > 0 && !isDayDone) {
      if (!progEl) { progEl = document.createElement('div'); progEl.className = 'day-prog'; card.appendChild(progEl); }
      progEl.textContent = `${exDone}/${day.exercises.length} exercises done`;
    } else if (progEl) {
      progEl.remove();
    }
  });
}

function resetDay(di) {
  const prog = getProgress(currentProfile);
  delete prog[dayKey(currentWeek, di)];
  weeks[currentWeek].days[di].exercises.forEach((_, ei) => { delete prog[exKey(currentWeek, di, ei)]; });
  saveProgress(currentProfile, prog);
  updateOverall();
  selectDay(di);
  refreshDayCard(di);
}

function refreshDayCard(di) {
  const prog = getProgress(currentProfile);
  const day = weeks[currentWeek].days[di];
  const isDayDone = prog[dayKey(currentWeek, di)] === true;
  const exDone = day.exercises.filter((_, ei) => prog[exKey(currentWeek, di, ei)] === true).length;
  const cards = document.querySelectorAll('.day-card');
  if (cards[di]) {
    cards[di].className = 'day-card selected' + (isDayDone ? ' completed' : '');
    cards[di].querySelector('.day-prog') && (cards[di].querySelector('.day-prog').remove());
    if (exDone > 0 && !isDayDone) {
      const d = document.createElement('div');
      d.className = 'day-prog';
      d.textContent = `${exDone}/${day.exercises.length} exercises done`;
      cards[di].appendChild(d);
    }
    const chk = cards[di].querySelector('.day-check');
    if (chk) chk.style.display = isDayDone ? 'flex' : 'none';
  }
  updateWeekTabDots();
}

function updateOverall() {
  const prog = getProgress(currentProfile);
  let daysCount = 0, exCount = 0;
  weeks.forEach((w, wi) => {
    w.days.forEach((day, di) => {
      if (prog[dayKey(wi, di)] === true) daysCount++;
      day.exercises.forEach((_, ei) => { if (prog[exKey(wi, di, ei)] === true) exCount++; });
    });
  });
  const pct = Math.round((daysCount / TOTAL_DAYS) * 100);
  document.getElementById('overallPct').textContent = pct + '%';
  document.getElementById('overallFill').style.width = pct + '%';
  document.getElementById('statDays').textContent = daysCount;
  document.getElementById('statEx').textContent = exCount;
  document.getElementById('resetAllWrap').style.display = daysCount >= TOTAL_DAYS ? 'block' : 'none';
}

function confirmResetAll() {
  document.getElementById('resetProfileName').textContent = currentProfile;
  document.getElementById('resetAllWrap').style.display = 'none';
  document.getElementById('resetConfirm').style.display = 'block';
}

function cancelResetAll() {
  document.getElementById('resetConfirm').style.display = 'none';
  document.getElementById('resetAllWrap').style.display = 'block';
}

function doResetAll() {
  saveProgress(currentProfile, {});
  document.getElementById('resetConfirm').style.display = 'none';
  document.getElementById('detailPanel').classList.remove('visible');
  updateOverall();
  renderWeek(0);
}

renderProfileScreen();
</script>
